description: "Dev Container image with the Deno JavaScript/TypeScript runtime, built on Debian"
# VERSION in each url is replaced with the build_args value named by
# version_key; commit_to_pr files are pushed onto version-bump PRs.
materials:
  - path: deno-amd64.sha256
    url: https://dl.deno.land/release/vVERSION/deno-x86_64-unknown-linux-gnu.zip.sha256sum
    version_key: DENO_VERSION
    commit_to_pr: true
    description: >-
      Checksum for deno (amd64) from dl.deno.land (the official download host
      used by Deno's install script), matching the pinned DENO_VERSION. Deno
      publishes no signature for its release archives, so this committed file
      is the trust anchor the Dockerfile verifies the downloaded archive
      against. The archive itself is fetched from GitHub Releases, so the
      binary and its checksum come from two independent distribution channels.
  - path: deno-arm64.sha256
    url: https://dl.deno.land/release/vVERSION/deno-aarch64-unknown-linux-gnu.zip.sha256sum
    version_key: DENO_VERSION
    commit_to_pr: true
    description: >-
      Checksum for deno (arm64); same trust anchor as the amd64 entry.
variants:
  - variant: "2-trixie"
    tags:
      # renovate: datasource=github-releases depName=denoland/deno versioning=semver extractVersion=^v(?<version>.+)
      - "2.9.2-trixie"
      - "2-trixie"
      - "trixie"
      # renovate: datasource=github-releases depName=denoland/deno versioning=semver extractVersion=^v(?<version>.+)
      - "2.9.2"
      - "2"
    debian_variant: "trixie"
    build_args:
      # renovate: datasource=github-releases depName=denoland/deno versioning=semver extractVersion=^v(?<version>.+)
      DENO_VERSION: "2.9.2"

  - variant: "2-bookworm"
    tags:
      # renovate: datasource=github-releases depName=denoland/deno versioning=semver extractVersion=^v(?<version>.+)
      - "2.9.2-bookworm"
      - "2-bookworm"
      - "bookworm"
    debian_variant: "bookworm"
    build_args:
      # renovate: datasource=github-releases depName=denoland/deno versioning=semver extractVersion=^v(?<version>.+)
      DENO_VERSION: "2.9.2"
