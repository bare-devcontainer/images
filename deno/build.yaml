description: "Dev Container image with the Deno JavaScript/TypeScript runtime, built on Debian"
materials:
  - path: githubcli-archive-keyring.gpg
    url: https://cli.github.com/packages/githubcli-archive-keyring.gpg
    description: >-
      GPG keyring that signs GitHub's official apt repository, used to install
      the gh CLI in the deno builder stage.
variants:
  - variant: "2-trixie"
    tags:
      # renovate: datasource=github-releases depName=denoland/deno versioning=semver extractVersion=^v(?<version>.+)
      - "2.9.2-trixie"
      - "2-trixie"
      - "trixie"
      # renovate: datasource=github-releases depName=denoland/deno versioning=semver extractVersion=^v(?<version>.+)
      - "2.9.2"
      - "2"
    debian_variant: "trixie"
    build_args:
      # renovate: datasource=github-releases depName=denoland/deno versioning=semver extractVersion=^v(?<version>.+)
      DENO_VERSION: "2.9.2"
      # renovate: datasource=deb registryUrl=https://cli.github.com/packages?suite=stable&components=main&binaryArch=amd64 depName=gh versioning=deb
      GH_VERSION: "2.96.0"

  - variant: "2-bookworm"
    tags:
      # renovate: datasource=github-releases depName=denoland/deno versioning=semver extractVersion=^v(?<version>.+)
      - "2.9.2-bookworm"
      - "2-bookworm"
      - "bookworm"
    debian_variant: "bookworm"
    build_args:
      # renovate: datasource=github-releases depName=denoland/deno versioning=semver extractVersion=^v(?<version>.+)
      DENO_VERSION: "2.9.2"
      # renovate: datasource=deb registryUrl=https://cli.github.com/packages?suite=stable&components=main&binaryArch=amd64 depName=gh versioning=deb
      GH_VERSION: "2.96.0"
