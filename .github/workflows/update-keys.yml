name: Update Trusted Keys

on:
  pull_request:
    paths:
      - .github/workflows/update-keys.yml
  schedule:
    - cron: '0 6 * * 3'
  workflow_dispatch:

permissions: {}

jobs:
  update:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: node-keyring
            path: node/node-keyring.kbx
            url: https://github.com/nodejs/release-keys/raw/HEAD/gpg/pubring.kbx
            title: "chore(node): update Node.js release keyring"
            body: >-
              Automated sync of `node/node-keyring.kbx` from
              [nodejs/release-keys](https://github.com/nodejs/release-keys), which tracks
              the current set of Node.js release-signing keys.
          - id: mise-minisign
            path: mise/mise-minisign.pub
            url: https://raw.githubusercontent.com/jdx/mise/main/minisign.pub
            title: "chore(mise): update mise minisign public key"
            body: >-
              Automated sync of `mise/mise-minisign.pub` from
              [jdx/mise](https://github.com/jdx/mise), which publishes the current mise
              release-signing minisign key.
          - id: golang-google-signing-key
            path: golang/google-linux-signing-key.asc
            url: https://dl.google.com/linux/linux_signing_key.pub
            title: "chore(golang): update Google Linux signing key"
            body: >-
              Automated sync of `golang/google-linux-signing-key.asc` from
              [dl.google.com](https://dl.google.com/linux/linux_signing_key.pub), which
              publishes Google's Linux Packages signing key used to verify the Go toolchain.
          - id: bun-signing-key
            path: bun/bun-signing-key.asc
            url: https://keys.openpgp.org/vks/v1/by-fingerprint/F3DCC08A8572C0749B3E18888EAB4D40A7B22B59
            title: "chore(bun): update Bun release signing key"
            body: >-
              Automated sync of `bun/bun-signing-key.asc` from
              [keys.openpgp.org](https://keys.openpgp.org), which hosts the current Bun
              release-signing key (fingerprint F3DCC08A8572C0749B3E18888EAB4D40A7B22B59), matching
              the same key Bun's own official Docker image verifies against.
          - id: terraform-hashicorp-signing-key
            path: terraform/hashicorp-signing-key.asc
            url: https://www.hashicorp.com/.well-known/pgp-key.txt
            title: "chore(terraform): update HashiCorp release signing key"
            body: >-
              Automated sync of `terraform/hashicorp-signing-key.asc` from
              [hashicorp.com](https://www.hashicorp.com/.well-known/pgp-key.txt) (fingerprint
              C874011F0AB405110D02105534365D9472D7468F), which HashiCorp uses to sign the
              `SHA256SUMS.sig` files published alongside Terraform release archives on
              releases.hashicorp.com.
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Download remote file
        env:
          URL: ${{ matrix.url }}
        run: wget -q -T 30 -t 3 -O /tmp/downloaded "${URL}"

      - name: Check for changes
        id: diff
        env:
          TARGET_PATH: ${{ matrix.path }}
        run: |
          if cmp -s /tmp/downloaded "${TARGET_PATH}"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate GitHub App Token
        id: app-token
        if: steps.diff.outputs.changed == 'true'
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.HOUSEKEEPER_CLIENT_ID }}
          private-key: ${{ secrets.HOUSEKEEPER_PRIVATE_KEY }}

      - name: Open pull request
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TARGET_PATH: ${{ matrix.path }}
          TARGET_ID: ${{ matrix.id }}
          PR_TITLE: ${{ matrix.title }}
          PR_BODY: ${{ matrix.body }}
        run: |
          set -e
          cp /tmp/downloaded "${TARGET_PATH}"

          OWNER="${GITHUB_REPOSITORY_OWNER}"
          REPO="${GITHUB_REPOSITORY#*/}"
          BRANCH="housekeeper/update-${TARGET_ID}"

          if ! gh api "repos/${OWNER}/${REPO}/git/ref/heads/${BRANCH}" > /dev/null 2>&1; then
            gh api "repos/${OWNER}/${REPO}/git/refs" \
              --method POST \
              -F ref="refs/heads/${BRANCH}" \
              -F sha="${GITHUB_SHA}"
          fi

          existing_sha=$(gh api "repos/${OWNER}/${REPO}/contents/${TARGET_PATH}?ref=${BRANCH}" \
            --jq '.sha' 2>/dev/null || true)

          args=(
            --method PUT
            -F message="${PR_TITLE}"
            -F content="$(base64 -w0 "${TARGET_PATH}")"
            -F branch="${BRANCH}"
          )
          [ -n "$existing_sha" ] && args+=(-F sha="$existing_sha")
          gh api "repos/${OWNER}/${REPO}/contents/${TARGET_PATH}" "${args[@]}"

          if [ -z "$(gh pr list --state open --head "${BRANCH}" --json number --jq '.[0]')" ]; then
            gh pr create \
              --title "${PR_TITLE}" \
              --body "${PR_BODY}" \
              --head "${BRANCH}" \
              --base main
          fi
