#
name: Publish Docker Images

on:
  schedule:
    - cron: '0 0 * * *'
  pull_request:
    paths:
      - .github/workflows/publish.yml
      - '*/Dockerfile'
      - '*/build.yaml'
  workflow_dispatch:

concurrency:
  group: publish
  cancel-in-progress: false

permissions: {}

env:
  BASE_IMAGE_REF: ghcr.io/${{ github.repository_owner }}/debian
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  setup:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      build_date: ${{ steps.init.outputs.build_date }}
      should_run: ${{ steps.init.outputs.should_run }}
      matrix: ${{ steps.matrix.outputs.matrix }}
      base_variants: ${{ steps.matrix.outputs.base_variants }}
    steps:
      - name: Check run conditions
        id: init
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          BUILD_DATE=$(date -u +%Y%m%d)
          echo "build_date=${BUILD_DATE}" >> "$GITHUB_OUTPUT"

          LATEST_TAG=$(gh api "repos/${REPO}/git/refs/tags/v" \
            --paginate \
            --jq '.[] | select(.ref | test("refs/tags/v[0-9]{8}")) | .ref | ltrimstr("refs/tags/")' \
            2>/dev/null | sort | tail -1 || echo "")
          echo "latest_tag=${LATEST_TAG}" >> "$GITHUB_OUTPUT"

          if [ "${EVENT_NAME}" = "pull_request" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -n "$LATEST_TAG" ]; then
            IMAGE_COMMITS=$(gh api "repos/${REPO}/compare/${LATEST_TAG}...${SHA}" \
              --jq '[.commits[].commit.message | split("\n")[0]] | map(select(test("^image(\\([^)]*\\))?!?:"))) | length' \
              2>/dev/null || echo "1")
            if [ "$IMAGE_COMMITS" = "0" ]; then
              echo "No image commits since ${LATEST_TAG}, skipping."
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          echo "should_run=true" >> "$GITHUB_OUTPUT"
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Build image matrix
        id: matrix
        run: |
          MATRIX=$(bash build-config.sh all-matrix)
          BASE_VARIANTS=$(bash build-config.sh variants debian | jq -c .)
          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"
          echo "base_variants=${BASE_VARIANTS}" >> "$GITHUB_OUTPUT"

          echo "=== Build targets ==="
          echo "Base variants:"
          echo "$BASE_VARIANTS" | jq -r '.[] | "  " + .'
          echo "Other images:"
          echo "$MATRIX" | jq -r '.[] | "  " + .image + ":" + .primary_tag'
      - name: Write release summary
        if: steps.init.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          BUILD_DATE: ${{ steps.init.outputs.build_date }}
          LATEST_TAG: ${{ steps.init.outputs.latest_tag }}
          MATRIX: ${{ steps.matrix.outputs.matrix }}
          BASE_VARIANTS: ${{ steps.matrix.outputs.base_variants }}
          REPO_OWNER: ${{ github.repository_owner }}
          BASE_IMAGE_REF: ${{ env.BASE_IMAGE_REF }}
        run: |
          {
            echo "## Release: v${BUILD_DATE}"
            echo ""
            if [ -n "$LATEST_TAG" ]; then
              echo "### Image updates since ${LATEST_TAG}"
              UPDATES=$(gh api "repos/${REPO}/compare/${LATEST_TAG}...${SHA}" \
                --jq '.commits[] | select(.commit.message | split("\n")[0] | test("^image(\\([^)]*\\))?!?:")) | "- `" + .sha[:7] + "` " + (.commit.message | split("\n")[0])')
              if [ -n "$UPDATES" ]; then
                echo "$UPDATES"
              else
                echo "_No image updates since ${LATEST_TAG}._"
              fi
            else
              echo "_No previous release tag found._"
            fi
            echo ""
            echo "### Images to be pushed"
            echo ""
            echo "**Debian base:**"
            echo "$BASE_VARIANTS" | jq -r '.[]' | while read -r variant; do
              echo "- \`${BASE_IMAGE_REF}:${variant}-${BUILD_DATE}\`"
            done
            echo ""
            echo "**Other images:**"
            echo "$MATRIX" | jq -r \
              '.[] | "- `ghcr.io/" + env.REPO_OWNER + "/" + .image + ":" + .primary_tag + "-" + env.BUILD_DATE + "`"'
          } >> "$GITHUB_STEP_SUMMARY"

  build-base:
    permissions:
      artifact-metadata: write
      attestations: write
      contents: read
      id-token: write
      packages: write
    needs: [setup]
    environment: ${{ github.event_name != 'pull_request' && 'release' || 'ci' }}
    if: needs.setup.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        variant: ${{ fromJson(needs.setup.outputs.base_variants) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Log in to the Container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Prepare build
        id: prep
        env:
          VARIANT: ${{ matrix.variant }}
          BUILD_DATE: ${{ needs.setup.outputs.build_date }}
          BASE_IMAGE_REF: ${{ env.BASE_IMAGE_REF }}
        run: |
          DATED_TAG="${VARIANT}-${BUILD_DATE}"
          BUILD_ARGS=$(bash build-config.sh build-args debian "$VARIANT")
          STATIC_TAGS=$(bash build-config.sh tags debian "$VARIANT" "$BASE_IMAGE_REF")
          DELIM="EOF_$(openssl rand -hex 8)"
          {
            echo "dated_tag=${DATED_TAG}"
            echo "build_args<<${DELIM}"
            echo "$BUILD_ARGS"
            echo "${DELIM}"
            echo "tags<<${DELIM}"
            echo "${BASE_IMAGE_REF}:${DATED_TAG}"
            echo "$STATIC_TAGS"
            echo "${DELIM}"
          } >> "$GITHUB_OUTPUT"

          echo "=== Tags to push ==="
          printf '%s\n' "${BASE_IMAGE_REF}:${DATED_TAG}" $STATIC_TAGS
          echo "=== Build args ==="
          echo "$BUILD_ARGS"
      - name: Check if tag already exists
        id: check
        env:
          DATED_TAG: ${{ steps.prep.outputs.dated_tag }}
          BASE_IMAGE_REF: ${{ env.BASE_IMAGE_REF }}
        run: |
          if docker manifest inspect "${BASE_IMAGE_REF}:${DATED_TAG}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${DATED_TAG} already exists, skipping build."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${DATED_TAG} not found, will build."
          fi
      - name: Extract metadata (labels) for Docker
        if: steps.check.outputs.exists != 'true'
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index
        with:
          images: ${{ env.BASE_IMAGE_REF }}
      - name: Build and push Docker image
        if: steps.check.outputs.exists != 'true'
        id: push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./debian
          platforms: ${{ env.PLATFORMS }}
          push: ${{ github.event_name != 'pull_request' }}
          build-args: ${{ steps.prep.outputs.build_args }}
          tags: ${{ steps.prep.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          sbom: true
          no-cache: ${{ github.event_name != 'pull_request' }}
          cache-from: ${{ github.event_name == 'pull_request' && format('type=gha,scope={0}', matrix.variant) || '' }}
          cache-to: ${{ github.event_name != 'pull_request' && format('type=gha,mode=max,scope={0}', matrix.variant) || '' }}
      - name: Generate artifact attestation
        if: steps.check.outputs.exists != 'true' && github.event_name != 'pull_request'
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ${{ env.BASE_IMAGE_REF }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  build-image:
    permissions:
      artifact-metadata: write
      attestations: write
      contents: read
      id-token: write
      packages: write
    needs: [setup, build-base]
    if: needs.setup.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        include: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Log in to the Container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Prepare build
        id: prep
        env:
          IMAGE: ${{ matrix.image }}
          PRIMARY_TAG: ${{ matrix.primary_tag }}
          VARIANT: ${{ matrix.variant }}
          REPO_OWNER: ${{ github.repository_owner }}
          BUILD_DATE: ${{ needs.setup.outputs.build_date }}
        run: |
          IMAGE_REF="ghcr.io/${REPO_OWNER}/${IMAGE}"
          DEBIAN_VARIANT=$(bash build-config.sh get-field "$IMAGE" "$VARIANT" debian_variant)
          DIGEST=$(docker buildx imagetools inspect "ghcr.io/${REPO_OWNER}/debian:${DEBIAN_VARIANT}" \
            --format '{{json .Manifest}}' | jq -r '.digest')
          if [ -z "$DIGEST" ] || [ "$DIGEST" = "null" ]; then
            echo "Failed to get digest for debian:${DEBIAN_VARIANT}" >&2
            exit 1
          fi
          DATED_TAG="${PRIMARY_TAG}-${BUILD_DATE}"
          BUILD_ARGS=$(bash build-config.sh build-args "$IMAGE" "$VARIANT")
          STATIC_TAGS=$(bash build-config.sh tags "$IMAGE" "$VARIANT" "$IMAGE_REF")
          DELIM="EOF_$(openssl rand -hex 8)"
          {
            echo "dated_tag=${DATED_TAG}"
            echo "build_args<<${DELIM}"
            echo "$BUILD_ARGS"
            echo "DEBIAN_TAG=${DEBIAN_VARIANT}@${DIGEST}"
            echo "${DELIM}"
            echo "tags<<${DELIM}"
            echo "${IMAGE_REF}:${DATED_TAG}"
            echo "$STATIC_TAGS"
            echo "${DELIM}"
          } >> "$GITHUB_OUTPUT"

          echo "=== Base image ==="
          echo "debian:${DEBIAN_VARIANT}@${DIGEST}"
          echo "=== Tags to push ==="
          printf '%s\n' "${IMAGE_REF}:${DATED_TAG}" $STATIC_TAGS
          echo "=== Build args ==="
          echo "$BUILD_ARGS"
      - name: Check if tag already exists
        id: check
        env:
          IMAGE: ${{ matrix.image }}
          REPO_OWNER: ${{ github.repository_owner }}
          DATED_TAG: ${{ steps.prep.outputs.dated_tag }}
        run: |
          IMAGE_REF="ghcr.io/${REPO_OWNER}/${IMAGE}"
          if docker manifest inspect "${IMAGE_REF}:${DATED_TAG}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${DATED_TAG} already exists, skipping build."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${DATED_TAG} not found, will build."
          fi
      - name: Extract metadata (labels) for Docker
        if: steps.check.outputs.exists != 'true'
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
      - name: Build and push Docker image
        if: steps.check.outputs.exists != 'true'
        id: push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./${{ matrix.image }}
          platforms: ${{ env.PLATFORMS }}
          push: ${{ github.event_name != 'pull_request' }}
          build-args: ${{ steps.prep.outputs.build_args }}
          tags: ${{ steps.prep.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          sbom: true
          no-cache: ${{ github.event_name != 'pull_request' }}
          cache-from: ${{ github.event_name == 'pull_request' && format('type=gha,scope={0}-{1}', matrix.image, matrix.variant) || '' }}
          cache-to: ${{ github.event_name != 'pull_request' && format('type=gha,mode=max,scope={0}-{1}', matrix.image, matrix.variant) || '' }}
      - name: Generate artifact attestation
        if: steps.check.outputs.exists != 'true' && github.event_name != 'pull_request'
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  create-tag:
    permissions:
      actions: write
      contents: write
    needs: [setup, build-base, build-image]
    if: needs.setup.outputs.should_run == 'true' && github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Create release tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          BUILD_DATE: ${{ needs.setup.outputs.build_date }}
        run: |
          if gh api "repos/${REPO}/git/ref/tags/v${BUILD_DATE}" > /dev/null 2>&1; then
            echo "Tag v${BUILD_DATE} already exists, skipping."
          else
            gh api "repos/${REPO}/git/refs" \
              --method POST \
              -f ref="refs/tags/v${BUILD_DATE}" \
              -f sha="${SHA}"
            echo "Created release tag v${BUILD_DATE}."
            gh workflow run trivy-published.yml \
              --repo "${REPO}" \
              --ref main
          fi
