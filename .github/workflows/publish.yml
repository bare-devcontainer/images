#
name: Publish Docker Image

on:
  pull_request:
    paths:
      - .github/workflows/publish.yml
  workflow_dispatch:

permissions: {}

env:
  IMAGE_REF: ghcr.io/${{ github.repository_owner }}/debian13

jobs:
  preflight:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      exists: ${{ steps.check.outputs.exists }}
      timestamp: ${{ steps.debian-tag.outputs.timestamp }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Extract Debian timestamp from Dockerfile
        id: debian-tag
        run: |
          TIMESTAMP=$(sed -n 's/FROM debian:[^-]*-\([0-9]\{8\}\).*/\1/p' debian13/Dockerfile)
          echo "timestamp=$TIMESTAMP" >> "$GITHUB_OUTPUT"
      - name: Log in to the Container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Check if tag already exists
        id: check
        run: |
          if docker manifest inspect ${{ env.IMAGE_REF }}:${{ steps.debian-tag.outputs.timestamp }} > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.debian-tag.outputs.timestamp }} already exists, skipping build."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: preflight
    if: needs.preflight.outputs.exists != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      artifact-metadata:write
      attestations: write
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Log in to the Container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.IMAGE_REF }}
          tags: |
            type=raw,value=${{ needs.preflight.outputs.timestamp }}
      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./debian13
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - name: Generate artifact attestation
        if: github.event_name != 'pull_request'
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ${{ env.IMAGE_REF }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
