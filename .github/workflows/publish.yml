#
name: Publish Docker Images

on:
  pull_request:
    paths:
      - .github/workflows/publish.yml
      - '*/Dockerfile'
      - '*/build.yaml'
  workflow_dispatch:

permissions: {}

env:
  BASE_IMAGE_REF: ghcr.io/${{ github.repository_owner }}/debian
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  build-base:
    permissions:
      artifact-metadata: write
      attestations: write
      contents: read
      id-token: write
      packages: write
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        variant: [trixie, bookworm]
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Read build args from build.yaml
        id: read
        run: |
          BUILD_ARGS=$(bash build-config.sh build-args debian "${{ matrix.variant }}")
          DEBIAN_TAG=$(echo "$BUILD_ARGS" | grep '^DEBIAN_TAG=' | cut -d= -f2-)
          {
            echo "build_args<<EOF"
            echo "$BUILD_ARGS"
            echo "EOF"
            echo "debian_tag=$DEBIAN_TAG"
          } >> "$GITHUB_OUTPUT"
      - name: Set build tags and base image metadata
        id: tag
        run: |
          BUILD_DATE=$(date +%Y%m%d)
          DATED_TAG="${{ matrix.variant }}-$BUILD_DATE"
          BASE_TAG="${{ steps.read.outputs.debian_tag }}"
          STATIC_TAGS=$(bash build-config.sh tags debian "${{ matrix.variant }}" "${{ env.BASE_IMAGE_REF }}")
          {
            echo "dated_tag=$DATED_TAG"
            echo "tags<<EOF"
            echo "${{ env.BASE_IMAGE_REF }}:$DATED_TAG"
            echo "$STATIC_TAGS"
            echo "EOF"
            echo "base_name=debian:${BASE_TAG%%@*}"
            echo "base_digest=${BASE_TAG##*@}"
          } >> "$GITHUB_OUTPUT"
      - name: Log in to the Container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Check if tag already exists
        id: check
        run: |
          if docker manifest inspect ${{ env.BASE_IMAGE_REF }}:${{ steps.tag.outputs.dated_tag }} > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.tag.outputs.dated_tag }} already exists, skipping build."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Set up QEMU
        if: steps.check.outputs.exists != 'true'
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - name: Set up Docker Buildx
        if: steps.check.outputs.exists != 'true'
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Extract metadata (labels) for Docker
        if: steps.check.outputs.exists != 'true'
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.BASE_IMAGE_REF }}
      - name: Build and push Docker image
        if: steps.check.outputs.exists != 'true'
        id: push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./debian
          platforms: ${{ env.PLATFORMS }}
          push: ${{ github.event_name != 'pull_request' }}
          build-args: ${{ steps.read.outputs.build_args }}
          tags: ${{ steps.tag.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          sbom: true
      - name: Generate artifact attestation
        if: steps.check.outputs.exists != 'true' && github.event_name != 'pull_request'
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ${{ env.BASE_IMAGE_REF }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  setup-matrix:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      # space-separated list of images to build
      IMAGES: golang mise rust zig
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Build image matrix
        id: build
        run: |
          MATRIX=$(
            for IMAGE in $IMAGES; do
              bash build-config.sh image-matrix "$IMAGE"
            done | jq -c -s 'add // []'
          )
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  build-image:
    permissions:
      artifact-metadata: write
      attestations: write
      contents: read
      id-token: write
      packages: write
    needs: [build-base, setup-matrix]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        include: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Log in to the Container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Get debian variant digest
        id: debian
        run: |
          DEBIAN_VARIANT=$(bash build-config.sh get-field "${{ matrix.image }}" \
            "${{ matrix.variant }}" debian_variant)
          DEBIAN_REF="ghcr.io/${{ github.repository_owner }}/debian:${DEBIAN_VARIANT}"
          DIGEST=$(docker buildx imagetools inspect "${DEBIAN_REF}" \
            --format '{{json .Manifest}}' | jq -r '.digest')
          echo "debian_tag=${DEBIAN_VARIANT}@${DIGEST}" >> "$GITHUB_OUTPUT"
      - name: Assemble build args and tags
        id: assemble
        run: |
          IMAGE_REF="ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}"
          BUILD_DATE=$(date +%Y%m%d)
          DATED_TAG="${{ matrix.primary_tag }}-${BUILD_DATE}"
          BUILD_ARGS=$(bash build-config.sh build-args "${{ matrix.image }}" \
            "${{ matrix.variant }}")
          STATIC_TAGS=$(bash build-config.sh tags "${{ matrix.image }}" \
            "${{ matrix.variant }}" "$IMAGE_REF")
          {
            echo "dated_tag=${DATED_TAG}"
            echo "build_args<<EOF"
            echo "$BUILD_ARGS"
            echo "DEBIAN_TAG=${{ steps.debian.outputs.debian_tag }}"
            echo "EOF"
            echo "tags<<EOF"
            echo "${IMAGE_REF}:${DATED_TAG}"
            echo "$STATIC_TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Check if tag already exists
        id: check
        run: |
          IMAGE_REF="ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}"
          if docker manifest inspect "${IMAGE_REF}:${{ steps.assemble.outputs.dated_tag }}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.assemble.outputs.dated_tag }} already exists, skipping build."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Set up QEMU
        if: steps.check.outputs.exists != 'true'
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - name: Set up Docker Buildx
        if: steps.check.outputs.exists != 'true'
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Extract metadata (labels) for Docker
        if: steps.check.outputs.exists != 'true'
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
      - name: Build and push Docker image
        if: steps.check.outputs.exists != 'true'
        id: push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./${{ matrix.image }}
          platforms: ${{ env.PLATFORMS }}
          push: ${{ github.event_name != 'pull_request' }}
          build-args: ${{ steps.assemble.outputs.build_args }}
          tags: ${{ steps.assemble.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          sbom: true
      - name: Generate artifact attestation
        if: steps.check.outputs.exists != 'true' && github.event_name != 'pull_request'
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
