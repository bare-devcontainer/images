name: Attestation Checks

on:
  schedule:
    - cron: '0 8 * * 1'
  pull_request:
    paths:
      - .github/workflows/attest-check.yml
  workflow_dispatch:

permissions: {}

env:
  BASE_IMAGE_REF: ghcr.io/${{ github.repository_owner }}/debian

jobs:
  setup:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      base_variants: ${{ steps.build.outputs.base_variants }}
      matrix: ${{ steps.build.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Build image matrix
        id: build
        run: |
          echo "base_variants=$(bash build-config.sh variants debian | jq -c .)" >> "$GITHUB_OUTPUT"
          echo "matrix=$(bash build-config.sh all-matrix)" >> "$GITHUB_OUTPUT"

  verify-base:
    needs: setup
    permissions:
      contents: read
    runs-on: ubuntu-slim
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        variant: ${{ fromJson(needs.setup.outputs.base_variants) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Verify published image
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_REF: ${{ env.BASE_IMAGE_REF }}:${{ matrix.variant }}
          OWNER: ${{ github.repository_owner }}
        run: bash verify-image.sh "$IMAGE_REF" "$OWNER"

  verify-image:
    needs: setup
    permissions:
      contents: read
    runs-on: ubuntu-slim
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Verify published image
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_REF: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ matrix.primary_tag }}
          OWNER: ${{ github.repository_owner }}
        run: bash verify-image.sh "$IMAGE_REF" "$OWNER"
