name: Build Checks

on:
  pull_request:
    paths:
      - .github/workflows/build-checks.yml
      - '*/Dockerfile'
      - '*/build.yaml'
      - '*/smoke-test.sh'
      - '*/node-keyring.kbx'
      - build-config.sh
      - .trivyignore.yaml
  push:
    branches:
      - main
    paths:
      - '*/Dockerfile'
      - '*/build.yaml'
      - '*/smoke-test.sh'
      - '*/node-keyring.kbx'
      - build-config.sh

permissions: {}

env:
  # renovate: datasource=github-releases depName=aquasecurity/trivy
  TRIVY_VERSION: "v0.71.2"
  TRIVY_SEVERITY: CRITICAL,HIGH

jobs:
  setup:
    permissions:
      contents: read
    runs-on: ubuntu-slim
    timeout-minutes: 5
    outputs:
      base_variants: ${{ steps.build.outputs.base_variants }}
      matrix: ${{ steps.build.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Build matrix
        id: build
        run: |
          echo "base_variants=$(bash build-config.sh variants debian | jq -c .)" >> "$GITHUB_OUTPUT"
          echo "matrix=$(bash build-config.sh all-matrix)" >> "$GITHUB_OUTPUT"

  check-base:
    needs: setup
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        variant: ${{ fromJson(needs.setup.outputs.base_variants) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Read build args
        id: read
        run: |
          DELIM="EOF_$(openssl rand -hex 8)"
          {
            echo "build_args<<${DELIM}"
            bash build-config.sh build-args debian "${{ matrix.variant }}"
            echo "${DELIM}"
          } >> "$GITHUB_OUTPUT"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Build debian image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./debian
          push: false
          load: true
          tags: debian:${{ matrix.variant }}
          build-args: ${{ steps.read.outputs.build_args }}
          cache-from: type=gha,scope=debian-${{ matrix.variant }}
          cache-to: ${{ github.ref == 'refs/heads/main' && format('type=gha,scope=debian-{0},mode=max', matrix.variant) || '' }}
      - name: Run smoke test
        run: |
          docker run --rm \
            --mount "type=bind,source=${{ github.workspace }}/debian/smoke-test.sh,target=/smoke-test.sh,readonly" \
            "debian:${{ matrix.variant }}" \
            bash /smoke-test.sh
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: ${{ env.TRIVY_VERSION }}
          image-ref: debian:${{ matrix.variant }}
          format: table
          severity: ${{ env.TRIVY_SEVERITY }}
          ignore-unfixed: true
          trivyignores: .trivyignore.yaml
          exit-code: '1'

  check-image:
    needs: setup
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Read build args
        id: read
        run: |
          DEBIAN_VARIANT=$(bash build-config.sh get-field "${{ matrix.image }}" \
            "${{ matrix.variant }}" debian_variant)
          DELIM="EOF_$(openssl rand -hex 8)"
          {
            echo "image_args<<${DELIM}"
            bash build-config.sh build-args "${{ matrix.image }}" "${{ matrix.variant }}"
            echo "DEBIAN_TAG=${DEBIAN_VARIANT}"
            echo "${DELIM}"
          } >> "$GITHUB_OUTPUT"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Build language image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./${{ matrix.image }}
          push: false
          load: true
          tags: ${{ matrix.image }}:${{ matrix.variant }}
          build-args: ${{ steps.read.outputs.image_args }}
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.variant }}
          cache-to: ${{ github.ref == 'refs/heads/main' && format('type=gha,scope={0}-{1},mode=max', matrix.image, matrix.variant) || '' }}
      - name: Run smoke test
        env:
          MISE_GITHUB_TOKEN: ${{ matrix.image == 'mise' && github.token || '' }}
        run: |
          docker run --rm \
            ${{ matrix.image == 'mise' && '--env MISE_GITHUB_TOKEN' || '' }} \
            --mount "type=bind,source=${{ github.workspace }}/debian/smoke-test.sh,target=/smoke-test-debian.sh,readonly" \
            --mount "type=bind,source=${{ github.workspace }}/${{ matrix.image }}/smoke-test.sh,target=/smoke-test.sh,readonly" \
            "${{ matrix.image }}:${{ matrix.variant }}" \
            bash -c "bash /smoke-test-debian.sh && bash /smoke-test.sh"
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: ${{ env.TRIVY_VERSION }}
          image-ref: ${{ matrix.image }}:${{ matrix.variant }}
          format: table
          severity: ${{ env.TRIVY_SEVERITY }}
          ignore-unfixed: true
          trivyignores: .trivyignore.yaml
          exit-code: '1'
