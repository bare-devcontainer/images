name: Trivy Scan (Build)

on:
  push:
    branches:
      - main
    paths:
      - '*/Dockerfile'
      - '*/build.yaml'
  pull_request:
    paths:
      - '*/Dockerfile'
      - '*/build.yaml'
      - .github/workflows/trivy-build.yml

permissions: {}

env:
  # renovate: datasource=github-releases depName=aquasecurity/trivy
  TRIVY_VERSION: "v0.71.2"
  TRIVY_SEVERITY: CRITICAL,HIGH

jobs:
  setup:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      base_variants: ${{ steps.build.outputs.base_variants }}
      matrix: ${{ steps.build.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Build image matrix
        id: build
        run: |
          echo "base_variants=$(bash build-config.sh variants debian | jq -c .)" >> "$GITHUB_OUTPUT"
          echo "matrix=$(bash build-config.sh all-matrix)" >> "$GITHUB_OUTPUT"

  scan-base:
    needs: setup
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        variant: ${{ fromJson(needs.setup.outputs.base_variants) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Prepare build args
        id: prep
        env:
          VARIANT: ${{ matrix.variant }}
        run: |
          BUILD_ARGS=$(bash build-config.sh build-args debian "$VARIANT")
          DELIM="EOF_$(openssl rand -hex 8)"
          {
            echo "build_args<<${DELIM}"
            echo "$BUILD_ARGS"
            echo "${DELIM}"
          } >> "$GITHUB_OUTPUT"
      - name: Build Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./debian
          push: false
          load: true
          build-args: ${{ steps.prep.outputs.build_args }}
          tags: scan-base:${{ matrix.variant }}
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: ${{ env.TRIVY_VERSION }}
          image-ref: scan-base:${{ matrix.variant }}
          format: table
          severity: ${{ env.TRIVY_SEVERITY }}
          ignore-unfixed: true
          exit-code: '1'

  scan-image:
    needs: setup
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Prepare build
        id: prep
        env:
          IMAGE: ${{ matrix.image }}
          VARIANT: ${{ matrix.variant }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          DEBIAN_VARIANT=$(bash build-config.sh get-field "$IMAGE" "$VARIANT" debian_variant)
          DIGEST=$(docker buildx imagetools inspect "ghcr.io/${REPO_OWNER}/debian:${DEBIAN_VARIANT}" \
            --format '{{json .Manifest}}' | jq -r '.digest')
          if [ -z "$DIGEST" ] || [ "$DIGEST" = "null" ]; then
            echo "Failed to get digest for debian:${DEBIAN_VARIANT}" >&2
            exit 1
          fi
          BUILD_ARGS=$(bash build-config.sh build-args "$IMAGE" "$VARIANT")
          DELIM="EOF_$(openssl rand -hex 8)"
          {
            echo "build_args<<${DELIM}"
            echo "$BUILD_ARGS"
            echo "DEBIAN_TAG=${DEBIAN_VARIANT}@${DIGEST}"
            echo "${DELIM}"
          } >> "$GITHUB_OUTPUT"
      - name: Build Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./${{ matrix.image }}
          push: false
          load: true
          build-args: ${{ steps.prep.outputs.build_args }}
          tags: scan-${{ matrix.image }}:${{ matrix.variant }}
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: ${{ env.TRIVY_VERSION }}
          image-ref: scan-${{ matrix.image }}:${{ matrix.variant }}
          format: table
          severity: ${{ env.TRIVY_SEVERITY }}
          ignore-unfixed: true
          exit-code: '1'
