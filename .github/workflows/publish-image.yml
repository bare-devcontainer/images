name: Publish Docker Image

on:
  workflow_call:
    inputs:
      image:
        description: 'Image name matching the subdirectory that contains the Dockerfile (e.g. debian, golang)'
        type: string
        required: true
      variant:
        description: 'Variant name as defined in build.yaml (e.g. bookworm, 1.26-trixie)'
        type: string
        required: true
      image_ref:
        description: 'Tag-less registry path used as the base for all published tags (e.g. ghcr.io/owner/debian)'
        type: string
        required: true
      build_date:
        description: 'Date appended to the primary tag to create a dated, immutable tag (YYYYMMDD)'
        type: string
        required: true
      overwrite:
        description: 'Overwrite the existing tags even if exist'
        type: boolean
        required: true
        default: false
      dryrun:
        description: 'Skip registry push and use GHA cache; true on pull_request events'
        type: boolean
        required: true
        default: true

permissions: {}

jobs:
  prepare:
    permissions:
      contents: read
      packages: read
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      dated_tag: ${{ steps.prep.outputs.dated_tag }}
      skip: ${{ steps.check.outputs.exists }}
      build_args: ${{ steps.prep.outputs.build_args }}
      tags: ${{ steps.prep.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}
      annotations: ${{ steps.meta.outputs.annotations }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Log in to the Container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Prepare build
        id: prep
        env:
          IMAGE: ${{ inputs.image }}
          VARIANT: ${{ inputs.variant }}
          IMAGE_REF: ${{ inputs.image_ref }}
          BUILD_DATE: ${{ inputs.build_date }}
          OVERWRITE: ${{ inputs.overwrite }}
        run: |
          PRIMARY_TAG=$(bash build-config.sh primary-tag "$IMAGE" "$VARIANT")
          DATED_TAG="${PRIMARY_TAG}-${BUILD_DATE}"
          BUILD_ARGS=$(bash build-config.sh build-args "$IMAGE" "$VARIANT")
          STATIC_TAGS=$(bash build-config.sh tags "$IMAGE" "$VARIANT" "$IMAGE_REF")

          DEBIAN_VARIANT=$(bash build-config.sh get-field "$IMAGE" "$VARIANT" debian_variant)
          if [ -n "$DEBIAN_VARIANT" ] && [ "$DEBIAN_VARIANT" != "null" ]; then
            DIGEST=$(docker buildx imagetools inspect \
              "$(dirname "$IMAGE_REF")/debian:${DEBIAN_VARIANT}" \
              --format '{{json .Manifest}}' | jq -r '.digest')
            if [ -z "$DIGEST" ] || [ "$DIGEST" = "null" ]; then
              echo "Failed to get digest for debian:${DEBIAN_VARIANT}" >&2
              exit 1
            fi
            echo "=== Base image ==="
            echo "debian:${DEBIAN_VARIANT}@${DIGEST}"
            BUILD_ARGS="${BUILD_ARGS}"$'\n'"DEBIAN_TAG=${DEBIAN_VARIANT}@${DIGEST}"
          fi

          DELIM="EOF_$(openssl rand -hex 8)"
          {
            echo "dated_tag=${DATED_TAG}"
            echo "build_args<<${DELIM}"
            echo "$BUILD_ARGS"
            echo "${DELIM}"
            echo "tags<<${DELIM}"
            echo "${IMAGE_REF}:${DATED_TAG}"
            echo "$STATIC_TAGS"
            echo "${DELIM}"
          } >> "$GITHUB_OUTPUT"

          echo "=== Tags to push ==="
          printf '%s\n' "${IMAGE_REF}:${DATED_TAG}" $STATIC_TAGS
          echo "=== Build args ==="
          echo "$BUILD_ARGS"
      - name: Check if tag already exists
        id: check
        env:
          IMAGE_REF: ${{ inputs.image_ref }}
          DATED_TAG: ${{ steps.prep.outputs.dated_tag }}
        run: |
          if docker manifest inspect "${IMAGE_REF}:${DATED_TAG}" > /dev/null 2>&1; then
            if [ "$OVERWRITE" = "true" ]; then 
              echo "exists=false" >> "$GITHUB_OUTPUT"
              echo "Tag ${DATED_TAG} already exists, will overwrite."
            else
              echo "exists=true" >> "$GITHUB_OUTPUT"
              echo "Tag ${DATED_TAG} already exists, skipping build."
            fi
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${DATED_TAG} not found, will build."
          fi
      - name: Extract metadata (labels) for Docker
        if: steps.check.outputs.exists != 'true' || inputs.dryrun
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest
        with:
          images: ${{ inputs.image_ref }}

  build:
    permissions:
      contents: read
      packages: read
    needs: [prepare]
    if: needs.prepare.outputs.skip != 'true' || inputs.dryrun
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Log in to the Container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Build linux/${{ matrix.arch }}
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./${{ inputs.image }}
          platforms: linux/${{ matrix.arch }}
          push: false
          outputs: type=oci,dest=/tmp/image,tar=false
          build-args: ${{ needs.prepare.outputs.build_args }}
          labels: ${{ needs.prepare.outputs.labels }}
          annotations: ${{ needs.prepare.outputs.annotations }}
          sbom: true
          no-cache: ${{ !inputs.dryrun }}
          cache-from: ${{ inputs.dryrun && format('type=gha,scope={0}-{1}-{2}', inputs.image, inputs.variant, matrix.arch) || '' }}
          cache-to: ${{ !inputs.dryrun && format('type=gha,mode=max,scope={0}-{1}-{2}', inputs.image, inputs.variant, matrix.arch) || '' }}
      - name: Upload OCI layout
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: image-${{ inputs.image }}-${{ inputs.variant }}-${{ matrix.arch }}
          path: /tmp/image
          retention-days: 1

  merge:
    needs: [prepare, build]
    permissions:
      packages: write
      artifact-metadata: write
      attestations: write
      id-token: write      
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download OCI layouts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: image-${{ inputs.image }}-${{ inputs.variant }}-*
          path: /tmp/oci
      - name: Log in to the Container registry
        if: "!inputs.dryrun"
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Extract metadata (annotations) for Docker
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: index
        with:
          images: ${{ inputs.image_ref }}
      - name: Create multi-arch manifest
        id: merge
        env:
          IMAGE_REF: ${{ inputs.image_ref }}
          DATED_TAG: ${{ needs.prepare.outputs.dated_tag }}
          TAGS: ${{ needs.prepare.outputs.tags }}
          ANNOTATIONS: ${{ steps.meta.outputs.annotations }}
          DRYRUN: ${{ inputs.dryrun }}
          OCI_LAYOUT_PREFIX: image-${{ inputs.image }}-${{ inputs.variant }}
        run: |
          TAG_ARGS=()
          while IFS= read -r tag; do
            [ -n "$tag" ] && TAG_ARGS+=(-t "$tag")
          done <<< "$TAGS"

          ANNOTATION_ARGS=()
          while IFS= read -r ann; do
            [ -n "$ann" ] && ANNOTATION_ARGS+=(--annotation "$ann")
          done <<< "$ANNOTATIONS"

          DRYRUN_FLAG=()
          [ "$DRYRUN" = "true" ] && DRYRUN_FLAG=(--dry-run)

          docker buildx imagetools create \
            "${DRYRUN_FLAG[@]}" \
            "${TAG_ARGS[@]}" \
            "${ANNOTATION_ARGS[@]}" \
            "oci-layout:///tmp/oci/${OCI_LAYOUT_PREFIX}-amd64" \
            "oci-layout:///tmp/oci/${OCI_LAYOUT_PREFIX}-arm64"

          if [ "$DRYRUN" != "true" ]; then
            DIGEST=$(docker buildx imagetools inspect "${IMAGE_REF}:${DATED_TAG}" \
              --format '{{json .Manifest}}' | jq -r '.digest')
            echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          fi
      - name: Generate artifact attestation
        if: "!inputs.dryrun"
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ${{ inputs.image_ref }}
          subject-digest: ${{ steps.merge.outputs.digest }}
          push-to-registry: true
