name: Update Trusted Material

# Keeps trust material committed to this repository — signing keys,
# keyrings, and per-version checksum files — in sync with each upstream,
# as declared under `materials` in each image's build.yaml.
# update-material.sh refreshes one image's files in the working tree and
# reports whether anything changed; this workflow loops over every image
# with materials, then does the git side once for everything that
# changed: on schedule/dispatch it commits to a single housekeeper
# branch and opens one pull request, and on pull_request events it
# commits materials marked commit_to_pr directly to the PR's head
# branch, so a version bump and its matching checksums land in a single
# PR.

on:
  pull_request:
    paths:
      - .github/workflows/update-material.yml
      - update-material.sh
      - build-config.sh
      # Re-syncs commit_to_pr materials when Renovate bumps a pinned version.
      - '*/build.yaml'
  schedule:
    - cron: '0 6 * * 3'
  workflow_dispatch:

permissions: {}

jobs:
  update:
    permissions:
      contents: read
    runs-on: ubuntu-slim
    timeout-minutes: 10
    env:
      # PRs from forks don't have access to secrets.
      IS_FORK_PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Update trusted material
        id: update
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -eo pipefail
          images=$(bash build-config.sh materials-images | jq -r '.[]')
          changed=false
          for image in $images; do
            args=("$image")
            if [ "$EVENT_NAME" = "pull_request" ]; then
              args+=(--commit-to-pr-only)
            fi
            result=$(bash update-material.sh "${args[@]}")
            if [ "$result" = "true" ]; then
              changed=true
            fi
          done
          echo "changed=$changed" >> "$GITHUB_OUTPUT"

      - name: Generate GitHub App Token
        id: app-token
        if: steps.update.outputs.changed == 'true' && env.IS_FORK_PR != 'true'
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.HOUSEKEEPER_CLIENT_ID }}
          private-key: ${{ secrets.HOUSEKEEPER_PRIVATE_KEY }}

      - name: Commit refreshed files
        if: steps.update.outputs.changed == 'true' && env.IS_FORK_PR != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          EVENT_NAME: ${{ github.event_name }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -eo pipefail

          OWNER="${GITHUB_REPOSITORY_OWNER}"
          REPO="${GITHUB_REPOSITORY#*/}"

          if [ "$EVENT_NAME" = "pull_request" ]; then
            BRANCH="${HEAD_REF}"
          else
            BRANCH="housekeeper/update-material"
            if ! gh api "repos/${OWNER}/${REPO}/git/ref/heads/${BRANCH}" > /dev/null 2>&1; then
              gh api "repos/${OWNER}/${REPO}/git/refs" \
                --method POST \
                -f ref="refs/heads/${BRANCH}" \
                -f sha="${GITHUB_SHA}"
            fi
          fi

          head_sha=$(gh api "repos/${OWNER}/${REPO}/git/ref/heads/${BRANCH}" --jq '.object.sha')
          base_tree=$(gh api "repos/${OWNER}/${REPO}/git/commits/${head_sha}" --jq '.tree.sha')

          # base64 keeps binary keyrings intact; --input avoids the kernel's
          # per-argument size limit. update-material.sh already refreshed
          # these paths in the working tree, across every changed image.
          tree_entries='[]'
          while IFS= read -r path; do
            blob_sha=$(base64 -w0 "$path" \
              | jq -R '{content: ., encoding: "base64"}' \
              | gh api "repos/${OWNER}/${REPO}/git/blobs" \
                  --method POST --input - --jq '.sha')
            tree_entries=$(jq --arg path "$path" --arg sha "$blob_sha" \
              '. + [{path: $path, mode: "100644", type: "blob", sha: $sha}]' \
              <<< "$tree_entries")
          done < <(git diff --name-only)

          tree_sha=$(jq -n --arg base_tree "$base_tree" --argjson tree "$tree_entries" \
            '{base_tree: $base_tree, tree: $tree}' \
            | gh api "repos/${OWNER}/${REPO}/git/trees" \
                --method POST --input - --jq '.sha')

          if [ "$tree_sha" = "$base_tree" ]; then
            echo "Branch ${BRANCH} is already up to date; nothing to commit."
            exit 0
          fi

          # No author/committer, so GitHub signs the commit (Verified).
          commit_sha=$(gh api "repos/${OWNER}/${REPO}/git/commits" \
            --method POST \
            -f message="chore: update trusted material" \
            -f tree="${tree_sha}" \
            -f "parents[]=${head_sha}" \
            --jq '.sha')

          # Fast-forward only; if a concurrent push moved the branch, the
          # run that push triggers refreshes the files again.
          gh api "repos/${OWNER}/${REPO}/git/refs/heads/${BRANCH}" \
            --method PATCH \
            -f sha="${commit_sha}"

      - name: Open pull request
        if: steps.update.outputs.changed == 'true' && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -eo pipefail
          BRANCH="housekeeper/update-material"
          if [ -z "$(gh pr list --state open --head "${BRANCH}" --json number --jq '.[0]')" ]; then
            files=$(git diff --name-only | sed 's/^/- `/;s/$/`/')
            gh pr create \
              --title "chore: update trusted material" \
              --body "Automated sync of trusted material."$'\n\n'"${files}" \
              --head "${BRANCH}" \
              --base main
          fi
