description: "Dev Container image with the Terraform CLI and terraform-ls, built on Debian"
materials:
  - path: hashicorp-signing-key.asc
    url: https://www.hashicorp.com/.well-known/pgp-key.txt
    description: >-
      HashiCorp release signing key (fingerprint
      C874011F0AB405110D02105534365D9472D7468F), which signs the SHA256SUMS.sig
      files published alongside Terraform release archives.
variants:
  - variant: "1-trixie"
    tags:
      # renovate: datasource=github-releases depName=hashicorp/terraform versioning=semver extractVersion=^v(?<version>.+)
      - "1.15.8-trixie"
      - "1-trixie"
      # renovate: datasource=github-releases depName=hashicorp/terraform versioning=semver extractVersion=^v(?<version>.+)
      - "1.15.8"
      - "1"
      - "trixie"
    debian_variant: "trixie"
    build_args:
      # renovate: datasource=github-releases depName=hashicorp/terraform versioning=semver extractVersion=^v(?<version>.+)
      TERRAFORM_VERSION: "1.15.8"
      # renovate: datasource=github-releases depName=hashicorp/terraform-ls versioning=semver extractVersion=^v(?<version>.+)
      TERRAFORM_LS_VERSION: "0.39.0"

  - variant: "1-bookworm"
    tags:
      # renovate: datasource=github-releases depName=hashicorp/terraform versioning=semver extractVersion=^v(?<version>.+)
      - "1.15.8-bookworm"
      - "1-bookworm"
      - "bookworm"
    debian_variant: "bookworm"
    build_args:
      # renovate: datasource=github-releases depName=hashicorp/terraform versioning=semver extractVersion=^v(?<version>.+)
      TERRAFORM_VERSION: "1.15.8"
      # renovate: datasource=github-releases depName=hashicorp/terraform-ls versioning=semver extractVersion=^v(?<version>.+)
      TERRAFORM_LS_VERSION: "0.39.0"
