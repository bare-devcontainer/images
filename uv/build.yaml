description: "Dev Container image for Python development with uv, built on Debian"
materials:
  - path: githubcli-archive-keyring.gpg
    url: https://cli.github.com/packages/githubcli-archive-keyring.gpg
    description: >-
      GPG keyring that signs GitHub's official apt repository, used to install
      the gh CLI in the uv builder stage.
variants:
  - variant: "trixie"
    tags:
      # renovate: datasource=github-releases depName=astral-sh/uv versioning=semver
      - "0.11.29-trixie"
      # renovate: datasource=github-releases depName=astral-sh/uv versioning=semver
      - "0.11.29"
      - "trixie"
    debian_variant: "trixie"
    build_args:
      # renovate: datasource=github-releases depName=astral-sh/uv versioning=semver
      UV_VERSION: "0.11.29"
      # renovate: datasource=deb registryUrl=https://cli.github.com/packages?suite=stable&components=main&binaryArch=amd64 depName=gh versioning=deb
      GH_VERSION: "2.96.0"

  - variant: "bookworm"
    tags:
      # renovate: datasource=github-releases depName=astral-sh/uv versioning=semver
      - "0.11.29-bookworm"
      - "bookworm"
    debian_variant: "bookworm"
    build_args:
      # renovate: datasource=github-releases depName=astral-sh/uv versioning=semver
      UV_VERSION: "0.11.29"
      # renovate: datasource=deb registryUrl=https://cli.github.com/packages?suite=stable&components=main&binaryArch=amd64 depName=gh versioning=deb
      GH_VERSION: "2.96.0"
