description: "Dev Container image with the mise polyglot runtime manager, built on Debian"
materials:
  - path: mise-minisign.pub
    url: https://raw.githubusercontent.com/jdx/mise/main/minisign.pub
    description: >-
      minisign public key published by jdx/mise, used to verify mise release
      artifacts.
variants:
  - variant: "latest-trixie"
    tags:
      # renovate: datasource=github-releases depName=jdx/mise versioning=semver extractVersion=^v?(?<version>.+)
      - "2026.7.12-trixie"
      # renovate: datasource=github-releases depName=jdx/mise versioning=semver extractVersion=^v?(?<version>.+)
      - "2026.7.12"
      - "trixie"
    debian_variant: "trixie"
    build_args:
      # renovate: datasource=github-releases depName=jdx/mise versioning=semver extractVersion=^v?(?<version>.+)
      MISE_VERSION: "2026.7.12"

# No bookworm variant: mise >= 2026.7.0 requires a newer glibc than bookworm
# provides, and mise uses calendar versioning, so no future release can ever
# satisfy bookworm again. Publishing a permanently frozen mise would mean
# shipping a tool that no longer receives security fixes.
