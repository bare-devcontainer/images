description: "Dev Container image with the Bun JavaScript/TypeScript runtime, built on Debian"
materials:
  - path: bun-signing-key.asc
    url: https://keys.openpgp.org/vks/v1/by-fingerprint/F3DCC08A8572C0749B3E18888EAB4D40A7B22B59
    description: >-
      Bun release-signing key from keys.openpgp.org (fingerprint
      F3DCC08A8572C0749B3E18888EAB4D40A7B22B59), matching the key Bun's own
      official Docker image verifies against.
variants:
  - variant: "1-trixie"
    tags:
      # renovate: datasource=github-releases depName=oven-sh/bun versioning=semver extractVersion=^bun-v(?<version>.+)
      - "1.3.14-trixie"
      - "1-trixie"
      # renovate: datasource=github-releases depName=oven-sh/bun versioning=semver extractVersion=^bun-v(?<version>.+)
      - "1.3.14"
      - "1"
      - "trixie"
    debian_variant: "trixie"
    build_args:
      # renovate: datasource=github-releases depName=oven-sh/bun versioning=semver extractVersion=^bun-v(?<version>.+)
      BUN_VERSION: "1.3.14"

  - variant: "1-bookworm"
    tags:
      # renovate: datasource=github-releases depName=oven-sh/bun versioning=semver extractVersion=^bun-v(?<version>.+)
      - "1.3.14-bookworm"
      - "1-bookworm"
      - "bookworm"
    debian_variant: "bookworm"
    build_args:
      # renovate: datasource=github-releases depName=oven-sh/bun versioning=semver extractVersion=^bun-v(?<version>.+)
      BUN_VERSION: "1.3.14"
