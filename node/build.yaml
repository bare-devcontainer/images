description: "Dev Container image with Node.js, built on Debian"
materials:
  - path: node-keyring.kbx
    url: https://github.com/nodejs/release-keys/raw/HEAD/gpg/pubring.kbx
    description: >-
      GPG keyring from nodejs/release-keys, which tracks the current set of
      Node.js release-signing keys.
variants:
  - variant: "26-trixie"
    tags:
      # renovate: datasource=node-version depName=node versioning=node
      - "26.5.0-trixie"
      - "26-trixie"
      - "trixie"
      # renovate: datasource=node-version depName=node versioning=node
      - "26.5.0"
      - "26"
    debian_variant: "trixie"
    build_args:
      # renovate: datasource=node-version depName=node versioning=node
      NODE_VERSION: "26.5.0"
      # renovate: datasource=npm depName=corepack versioning=semver
      COREPACK_VERSION: "0.35.0"

  - variant: "26-bookworm"
    tags:
      # renovate: datasource=node-version depName=node versioning=node
      - "26.5.0-bookworm"
      - "26-bookworm"
      - "bookworm"
    debian_variant: "bookworm"
    build_args:
      # renovate: datasource=node-version depName=node versioning=node
      NODE_VERSION: "26.5.0"
      # renovate: datasource=npm depName=corepack versioning=semver
      COREPACK_VERSION: "0.35.0"

  - variant: "24-trixie"
    tags:
      # renovate: datasource=node-version depName=node versioning=node
      - "24.18.0-trixie"
      - "24-trixie"
      # renovate: datasource=node-version depName=node versioning=node
      - "24.18.0"
      - "24"
    debian_variant: "trixie"
    build_args:
      # renovate: datasource=node-version depName=node versioning=node
      NODE_VERSION: "24.18.0"
      # renovate: datasource=npm depName=corepack versioning=semver
      COREPACK_VERSION: "0.35.0"

  - variant: "24-bookworm"
    tags:
      # renovate: datasource=node-version depName=node versioning=node
      - "24.18.0-bookworm"
      - "24-bookworm"
    debian_variant: "bookworm"
    build_args:
      # renovate: datasource=node-version depName=node versioning=node
      NODE_VERSION: "24.18.0"
      # renovate: datasource=npm depName=corepack versioning=semver
      COREPACK_VERSION: "0.35.0"
